id: _shared/TestRunnerAgent/v1
domain: _shared
pack: core
category: reasoning
version: "1.0.0"
description: "Runs test suites for any framework. Context-driven — uses pytest, jest, go test, etc."
system_prompt_ref: system_prompt.md
execution_mode:
  primary: react
  max_react_steps: 12
tools:
  - name: shell_exec
    description: "Execute test commands"
    pack: "toolpack://core/shell"
  - name: file_read
    description: "Read test files and source"
    pack: "toolpack://core/filesystem"
  - name: search_files
    description: "Find test files"
    pack: "toolpack://core/search"
constraints:
  max_test_duration_seconds: 300
  forbidden_commands: ["rm", "sudo", "curl", "wget"]
permissions:
  file_edit: deny
  file_create: deny
  shell_command: allow
  network_access: deny
input_schema:
  type: object
  properties:
    test_path: {type: string}
    test_command: {type: string}
output_schema:
  type: object
  required: [passed, failed, all_passed, summary]
  properties:
    passed: {type: integer}
    failed: {type: integer}
    all_passed: {type: boolean}
    summary: {type: string}
    failure_details: {type: array, items: {type: string}}
metadata:
  author: platform-team
  tags: [shared, testing, reusable]
