id: _shared/IntegrationTestAgent/v1
domain: _shared
pack: core
category: reasoning
version: "1.0.0"
description: "Runs integration tests with external services. Context-driven."
system_prompt_ref: system_prompt.md
execution_mode:
  primary: react
  max_react_steps: 12
tools:
  - name: shell_exec
    description: "Execute commands"
    pack: "toolpack://core/shell"
  - name: file_read
    description: "Read files"
    pack: "toolpack://core/filesystem"
  - name: search_files
    description: "Find files"
    pack: "toolpack://core/search"
permissions:
  file_edit: deny
  file_create: deny
  shell_command: allow
  network_access: deny
input_schema:
  type: object
  properties:
    task_description: {type: string}
output_schema:
  type: object
  required:
    - passed
    - failed
    - all_passed
    - summary
  properties:
    passed: {type: string}
    failed: {type: string}
    all_passed: {type: string}
    summary: {type: string}
metadata:
  tags: [shared, reusable]
