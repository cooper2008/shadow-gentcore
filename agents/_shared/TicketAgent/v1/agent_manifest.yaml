id: _shared/TicketAgent/v1
domain: _shared
pack: core
category: cost-optimized
version: "1.0.0"
description: "Creates and manages tickets. Context-driven."
system_prompt_ref: system_prompt.md
execution_mode:
  primary: react
  max_react_steps: 12
tools:
  - name: shell_exec
    description: "Execute commands"
    pack: "toolpack://core/shell"
permissions:
  file_edit: deny
  file_create: deny
  shell_command: allow
  network_access: deny
input_schema:
  type: object
  properties:
    task_description: {type: string}
output_schema:
  type: object
  required:
    - ticket_url
    - ticket_id
    - action_taken
    - summary
  properties:
    ticket_url: {type: string}
    ticket_id: {type: string}
    action_taken: {type: string}
    summary: {type: string}
metadata:
  tags: [shared, reusable]
