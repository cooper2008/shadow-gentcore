id: _shared/ReviewerAgent/v1
domain: _shared
pack: core
category: reasoning
version: "1.0.0"
description: "Reviews code against domain standards. Context-driven."
system_prompt_ref: system_prompt.md
execution_mode:
  primary: chain_of_thought
tools:
  - name: file_read
    description: "Read source files"
    pack: "toolpack://core/filesystem"
  - name: search_code
    description: "Search for patterns"
    pack: "toolpack://core/search"
permissions:
  file_edit: deny
  file_create: deny
  shell_command: deny
  network_access: deny
input_schema:
  type: object
  required: [files_to_review]
  properties:
    files_to_review: {type: array, items: {type: string}}
output_schema:
  type: object
  required: [approved, score, comments, summary]
  properties:
    approved: {type: boolean}
    score: {type: number}
    comments: {type: array, items: {type: object, properties: {file: {type: string}, severity: {type: string}, message: {type: string}}}}
    summary: {type: string}
metadata:
  author: platform-team
  tags: [shared, review, reusable]
