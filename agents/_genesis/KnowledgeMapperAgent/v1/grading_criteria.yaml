threshold: 0.85

criteria:
  - name: coverage_score
    type: automated
    weight: 2.0
    check: "coverage.overall >= 40"

  - name: no_empty_map
    type: automated
    weight: 2.0
    check: "knowledge_map is not None"

  - name: gaps_identified
    type: automated
    weight: 1.0
    check: "len(gaps) >= 0"

  - name: classification_quality
    type: llm_judge
    weight: 1.5
    prompt: "Are items classified into the right categories based on their document type and content? Does the coverage assessment realistically match the actual data volume? Are gaps correctly identified with appropriate severity levels? Are suggestions actionable?"
