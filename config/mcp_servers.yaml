# MCP Server Configuration
# Add community MCP servers here. Agents reference them via toolpack://mcp/<name>
#
# Usage:
#   ./ai mcp add context7 --command "npx -y @upstash/context7-mcp@latest"
#   ./ai mcp list
#
# Then in agent_manifest.yaml:
#   tools:
#     - name: query-docs
#       pack: "toolpack://mcp/context7"

servers:
  # Context7 — fetch up-to-date library documentation for any framework
  - name: context7
    command: "npx -y @upstash/context7-mcp@latest"
    transport: stdio
    description: "Fetch current documentation for libraries and frameworks"
    tools:
      - name: resolve-library-id
        description: "Resolve a library name to its Context7 ID"
      - name: query-docs
        description: "Query documentation for a specific library"

